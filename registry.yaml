# PMCR-O Colony — Master Skill Registry
# ============================================================
# Schema:   2.0
# Version:  5.1.0
# MAF:      1.10.0
# Colony:   {{colony_name}}
# Company:  {{company}}
# Updated:  2026-06-19
# ============================================================

schema_version: "2.0"
manifest_version: "5.1.0"
maf_version: "1.10.0"
company: "{{company}}"
colony: "{{colony_name}}"

# ── LOAD ORDER ───────────────────────────────────────────────
# Defines the sequence for Stage 1 (Advertise) in PmcroSkillLoader.
# PHASE agents must load before SUBJECT and SUPPORT agents.
load_order:
  - orchestrator-agent    # PHASE — must be first
  - planner-agent         # PHASE
  - maker-agent           # PHASE
  - checker-agent         # PHASE
  - reflector-agent       # PHASE
  - filesystem-agent      # SUBJECT
  - git-agent             # SUBJECT
  - playwright-agent      # SUBJECT
  - jira-agent            # SUBJECT
  - devops-agent          # SUBJECT
  - docfx-agent           # SUBJECT
  - skill-maker-agent     # SUPPORT — must be last

# ── SKILL INDEX ───────────────────────────────────────────────
skills:

  orchestrator-agent:
    path: "skills/orchestrator-agent/SKILL.md"
    domain_config: "skills/orchestrator-agent/domain_config.json"
    prompt_index: "skills/orchestrator-agent/prompts/prompt_index.json"
    type: "PHASE"
    tier: "ORCHESTRATION"
    triangle_role: "ORCHESTRATION"
    capability: "LOOP_CONTROLLER"
    kernel_plugin: "PmcroOrchestrator"
    kernel_function: "RouteIntent"
    schema_version: "2.0"
    skill_version: "5.0.0"
    validated: true

  planner-agent:
    path: "skills/planner-agent/SKILL.md"
    domain_config: "injected_from_subject_agent"
    prompt_index: "skills/planner-agent/prompts/prompt_index.json"
    type: "PHASE"
    tier: "ORCHESTRATION"
    triangle_role: "ORCHESTRATION"
    capability: "STRATEGY_GENERATION"
    kernel_plugin: "PmcroPlannerPlugin"
    kernel_function: "DecomposeIntent"
    schema_version: "2.0"
    skill_version: "5.0.0"
    validated: true

  maker-agent:
    path: "skills/maker-agent/SKILL.md"
    domain_config: "injected_from_subject_agent"
    prompt_index: "skills/maker-agent/prompts/prompt_index.json"
    type: "PHASE"
    tier: "EXECUTION"
    triangle_role: "EXECUTION"
    capability: "EXECUTION_ENGINE"
    kernel_plugin: "PmcroMakerPlugin"
    kernel_function: "ExecutePlan"
    schema_version: "2.0"
    skill_version: "5.0.0"
    validated: true

  checker-agent:
    path: "skills/checker-agent/SKILL.md"
    domain_config: "injected_from_subject_agent"
    prompt_index: "skills/checker-agent/prompts/prompt_index.json"
    type: "PHASE"
    tier: "EXECUTION"
    triangle_role: "EXECUTION"
    capability: "VALIDATION_GATE"
    kernel_plugin: "PmcroCheckerPlugin"
    kernel_function: "ValidateMakerFrame"
    schema_version: "2.0"
    skill_version: "5.0.0"
    validated: true

  reflector-agent:
    path: "skills/reflector-agent/SKILL.md"
    domain_config: "injected_from_subject_agent"
    prompt_index: "skills/reflector-agent/prompts/prompt_index.json"
    type: "PHASE"
    tier: "ORCHESTRATION"
    triangle_role: "ORCHESTRATION"
    capability: "TERMINAL_ARBITRATION"
    kernel_plugin: "PmcroReflectorPlugin"
    kernel_function: "ArbitrateCycle"
    schema_version: "2.0"
    skill_version: "5.0.0"
    validated: true

  filesystem-agent:
    path: "skills/filesystem-agent/SKILL.md"
    domain_config: "skills/filesystem-agent/domain_config.json"
    prompt_index: "skills/filesystem-agent/prompts/prompt_index.json"
    type: "SUBJECT"
    tier: "EXECUTION"
    triangle_role: "EXECUTION"
    capability: "FILESYSTEM_DOMAIN"
    kernel_plugin: "FilesystemPlugin"
    kernel_function: "ExecuteFilesystemAction"
    schema_version: "2.0"
    skill_version: "5.0.0"
    validated: true
    type1_actions: ["fs_write_file", "fs_delete", "fs_zip"]
    type2_actions: ["fs_read_file", "fs_list_directory", "source_dump"]

  git-agent:
    path: "skills/git-agent/SKILL.md"
    domain_config: "skills/git-agent/domain_config.json"
    prompt_index: "skills/git-agent/prompts/prompt_index.json"
    type: "SUBJECT"
    tier: "EXECUTION"
    triangle_role: "EXECUTION"
    capability: "VERSION_CONTROL_DOMAIN"
    kernel_plugin: "GitPlugin"
    kernel_function: "ExecuteGitAction"
    schema_version: "2.0"
    skill_version: "5.0.0"
    validated: true
    type1_actions: ["git_commit", "git_reset", "git_push"]
    type2_actions: ["git_status", "git_log", "git_add"]

  playwright-agent:
    path: "skills/playwright-agent/SKILL.md"
    domain_config: "skills/playwright-agent/domain_config.json"
    prompt_index: "skills/playwright-agent/prompts/prompt_index.json"
    type: "SUBJECT"
    tier: "EXECUTION"
    triangle_role: "EXECUTION"
    capability: "BROWSER_AUTOMATION"
    kernel_plugin: "PlaywrightAutomationKernel"
    kernel_function: "ExecuteBrowserWorkflow"
    schema_version: "2.0"
    skill_version: "1.0.0"
    validated: true
    mcp_server: "playwright-mcp"
    mcp_port: "{{playwright_mcp_port}}"
    type1_actions: ["mk_click", "mk_type", "browser_form_post"]
    type2_actions: ["mk_navigate", "mk_snapshot", "mk_extract", "mk_screenshot", "mk_batch_scrape"]
    scripts:
      validate_mcp: "skills/playwright-agent/scripts/validate-playwright-mcp.ps1"

  jira-agent:
    path: "skills/jira-agent/SKILL.md"
    domain_config: "skills/jira-agent/domain_config.json"
    prompt_index: "skills/jira-agent/prompts/prompt_index.json"
    type: "SUBJECT"
    tier: "EXECUTION"
    triangle_role: "EXECUTION"
    capability: "PROJECT_MANAGEMENT"
    kernel_plugin: "JiraIntegrationKernel"
    kernel_function: "ExecuteJiraWorkflow"
    schema_version: "2.0"
    skill_version: "1.0.0"
    validated: true
    mcp_server: "atlassian-rovo-mcp"
    mcp_url: "https://mcp.atlassian.com/v1/mcp"
    type1_actions: ["mk_create", "mk_transition", "mk_comment", "mk_edit", "mk_link", "mk_bulk_transition"]
    type2_actions: ["mk_search", "mk_get", "mk_resolve_project", "mk_resolve_transitions"]

  devops-agent:
    path: "skills/devops-agent/SKILL.md"
    domain_config: "skills/devops-agent/domain_config.json"
    prompt_index: "skills/devops-agent/prompts/prompt_index.json"
    type: "SUBJECT"
    tier: "EXECUTION"
    triangle_role: "EXECUTION"
    capability: "BUILD_AUTOMATION"
    kernel_plugin: "DevOpsAutomationKernel"
    kernel_function: "ExecuteDevOpsWorkflow"
    schema_version: "2.0"
    skill_version: "1.0.0"
    validated: true
    mcp_server: "terminal-mcp"
    mcp_port: "{{terminal_mcp_port}}"
    type1_actions: ["mk_publish", "mk_aspire_run", "mk_docker_run", "mk_docker_push"]
    type2_actions: ["mk_build", "mk_test", "mk_restore", "mk_sdk_verify", "mk_docker_status", "mk_mcp_health"]
    scripts:
      verify_sdk: "skills/devops-agent/scripts/verify-sdk.ps1"
      validate_mcp: "skills/devops-agent/scripts/validate-all-mcp.ps1"

  docfx-agent:
    path: "skills/docfx-agent/SKILL.md"
    domain_config: "skills/docfx-agent/domain_config.json"
    prompt_index: "skills/docfx-agent/prompts/prompt_index.json"
    type: "SUBJECT"
    tier: "EXECUTION"
    triangle_role: "EXECUTION"
    capability: "DOCUMENTATION_AUTOMATION"
    kernel_plugin: "DocfxPlugin"
    kernel_function: "ExecuteDocfxAction"
    schema_version: "2.0"
    skill_version: "5.0.0"
    validated: true
    validated_versions:
      docfx: "2.78.5"
      dotnet_sdk: "net9.0"
    scripts:
      build: "skills/docfx-agent/scripts/build.ps1"
      serve: "skills/docfx-agent/scripts/serve.ps1"
      validate: "skills/docfx-agent/scripts/validate.ps1"

  skill-maker-agent:
    path: "skills/skill-maker-agent/SKILL.md"
    domain_config: "skills/skill-maker-agent/domain_config.json"
    prompt_index: "skills/skill-maker-agent/prompts/prompt_index.json"
    type: "SUPPORT"
    tier: "ORCHESTRATION"
    triangle_role: "ORCHESTRATION"
    capability: "RECURSIVE_PROVISIONER"
    kernel_plugin: "SkillMakerKernel"
    kernel_function: "ProvisionSkillPackage"
    schema_version: "2.0"
    skill_version: "5.0.0"
    validated: true
    templates:
      skill: "skills/skill-maker-agent/assets/SKILL.template.md"
      domain_config: "skills/skill-maker-agent/assets/domain_config_template.json"
      prompt_index: "skills/skill-maker-agent/assets/prompt_index_template.json"

# ── STORAGE ───────────────────────────────────────────────────
storage:
  root: "S:/"
  skills_dir: "skills/"
  trails_dir: ".pmcro/trails/"
  constraints_dir: ".pmcro/constraints/"
  backups_dir: "backups/"
  logs_dir: ".pmcro/logs/"
  templates_dir: "skills/skill-maker-agent/assets/"

# ── COLONY LAWS ───────────────────────────────────────────────
colony_laws:
  - { id: "EC-SYS-001", name: "Atomic File Protocol",  enforced_by: ["orchestrator-agent", "maker-agent", "checker-agent"] }
  - { id: "EC-SYS-002", name: "Minimalist Planning",   enforced_by: ["planner-agent", "orchestrator-agent"] }
  - { id: "EC-SYS-003", name: "Log Before Act",        enforced_by: ["maker-agent", "reflector-agent"] }
  - { id: "EC-009",     name: "MaxLoops Hard Gate",    enforced_by: ["orchestrator-agent", "reflector-agent"] }
  - { id: "GTDDD-MANDATE", name: "Token Hygiene",      enforced_by: ["skill-maker-agent", "planner-agent"] }
  - { id: "MAAI-001",   name: "TYPE1 Authorization",   enforced_by: ["orchestrator-agent", "maker-agent", "checker-agent"] }
  - { id: "TOOL-FIRST", name: "Registry Fidelity",     enforced_by: ["orchestrator-agent"] }
