apiRules:
  # Exclude internal/private members from generated API docs
  - exclude:
      uidRegex: ^System\.
      type: Namespace
  - exclude:
      hasAttribute:
        uid: System.ObsoleteAttribute
      type: Member
  - exclude:
      uidRegex: \.Internal\.
      type: Namespace
  - exclude:
      uidRegex: \.Tests\.
      type: Namespace

  # Always include Colony frame types
  - include:
      uidRegex: .*Frame$
      type: Class
  - include:
      uidRegex: .*Agent.*
      type: Class
  - include:
      uidRegex: .*Plugin.*
      type: Class

  # Exclude auto-generated EF migrations
  - exclude:
      uidRegex: \.Migrations\.
      type: Namespace
